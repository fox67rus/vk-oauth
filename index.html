<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Token Extractor — n8n Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-container::-webkit-scrollbar { width: 6px; }
        .json-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .json-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scope-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: #e2e8f0; color: #475569; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h1 class="text-xl font-bold mb-4 text-indigo-600">Настройка Scopes</h1>
                
                <div id="scope-list" class="space-y-3 mb-6">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="wall" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Стена (wall)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="groups" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Группы (groups)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-amber-50 rounded-xl cursor-pointer hover:bg-amber-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="offline" checked class="w-4 h-4 text-amber-600">
                        <span class="text-sm font-medium text-amber-900 font-bold">Вечный доступ (offline)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="photos" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Фото (photos)</span>
                    </label>
                </div>

                <div class="space-y-3">
                    <button onclick="startAuth()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">
                        VK ID Auth (SDK)
                    </button>
                    <button onclick="startDirectAuth()" class="w-full bg-slate-800 text-white py-3 rounded-2xl font-bold hover:bg-slate-900 shadow-lg transition-all active:scale-95 text-sm">
                        Direct OAuth (Надежный метод)
                    </button>
                </div>
            </div>
            
            <div class="bg-red-50 p-6 rounded-3xl border border-red-100 text-[11px] text-red-700 leading-relaxed">
                <h3 class="font-bold mb-1 uppercase">Важно!</h3>
                Если <b>wall</b> не появляется, проверь в настройках приложения VK: 
                <br><b>Настройки -> Доверительный Redirect URI</b>. Там должен быть указан текущий адрес этой страницы.
            </div>
        </div>

        <div id="results-section" class="lg:col-span-2 space-y-6 opacity-40 pointer-events-none transition-all duration-500">
            
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Данные авторизации</h2>
                    <span id="expiry-tag" class="text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">---</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Access Token</span>
                            <button onclick="copy('access-token')" class="text-indigo-600 text-xs font-bold hover:underline">Копировать</button>
                        </div>
                        <div id="access-token" class="bg-slate-50 p-4 rounded-xl font-mono text-[11px] break-all border border-slate-100 text-slate-600">---</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="block text-[10px] text-slate-400 uppercase mb-1">User ID</span>
                            <span id="user-id" class="font-bold font-mono text-lg text-slate-800">---</span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <span class="block text-[10px] text-slate-400 uppercase mb-1">Реальные Scopes</span>
                            <div id="confirmed-scopes" class="flex flex-wrap gap-1 mt-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="test-block" class="bg-emerald-50 p-8 rounded-3xl border border-emerald-100 space-y-5">
                <h3 class="text-lg font-bold text-emerald-800 italic">Тест публикации для n8n</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="target-id" placeholder="ID Группы (напр. 218...)" class="p-4 rounded-2xl border border-emerald-200 text-sm outline-none shadow-sm">
                    <textarea id="post-text" class="p-4 rounded-2xl border border-emerald-200 text-sm outline-none shadow-sm" rows="1">Тест из песочницы 🚀</textarea>
                </div>
                <button onclick="testWallPost()" id="post-btn" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-md">
                    Подготовить ссылку для n8n
                </button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl">
                <pre id="raw-json" class="json-container text-emerald-400 text-[10px] font-mono overflow-auto max-h-[250px] whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@vkid/sdk@latest/dist-sdk/umd/index.js"></script>
    <script>
        const APP_ID = 54571103;
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function getSelectedScopes() {
            return Array.from(document.querySelectorAll('input[name="vk-scope"]:checked')).map(cb => cb.value).join(',');
        }

        // Метод 1: Через SDK
        function startAuth() {
            const scopes = getSelectedScopes().replace(/,/g, ' ');
            const VKID = window.VKIDSDK;
            VKID.Config.init({ app: APP_ID, redirectUrl: REDIRECT_URI, responseMode: 'callback', scope: scopes });
            VKID.Auth.login().then(payload => {
                VKID.Auth.exchangeCode(payload.code, payload.device_id).then(res => display(res));
            });
        }

        // Метод 2: Прямой OAuth (иногда надежнее для Scope)
        function startDirectAuth() {
            const scopes = getSelectedScopes();
            const authUrl = `https://oauth.vk.com/authorize?client_id=${APP_ID}&display=page&redirect_uri=${REDIRECT_URI}&scope=${scopes}&response_type=token&v=5.199`;
            window.location.href = authUrl;
        }

        // Обработка токена из URL (для Direct Auth)
        window.addEventListener('load', () => {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const params = new URLSearchParams(hash);
                if (params.get('access_token')) {
                    display({
                        access_token: params.get('access_token'),
                        user_id: params.get('user_id'),
                        expires_in: params.get('expires_in'),
                        scope: getSelectedScopes().replace(/,/g, ' ')
                    });
                }
            }
        });

        function display(data) {
            document.getElementById('results-section').classList.remove('opacity-40', 'pointer-events-none');
            document.getElementById('access-token').textContent = data.access_token;
            document.getElementById('user-id').textContent = data.user_id;
            document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);
            
            const scopeContainer = document.getElementById('confirmed-scopes');
            scopeContainer.innerHTML = '';
            const scopes = data.scope ? data.scope.split(/[ ,]+/) : [];
            scopes.forEach(s => {
                if(s) scopeContainer.innerHTML += `<span class="scope-badge">${s}</span>`;
            });
        }

        function testWallPost() {
            const target = document.getElementById('target-id').value.trim();
            const ownerId = target ? (target.startsWith('-') ? target : `-${target}`) : '';
            const params = new URLSearchParams({
                message: document.getElementById('post-text').value,
                access_token: document.getElementById('access-token').textContent,
                v: '5.199'
            });
            if (ownerId) params.append('owner_id', ownerId);
            
            console.log("=== URL ДЛЯ n8n ===");
            console.log(`https://api.vk.com/method/wall.post?${params.toString()}`);
            alert("URL готов в консоли (F12)!");
        }

        function copy(id) {
            navigator.clipboard.writeText(document.getElementById(id).textContent);
            alert("Скопировано!");
        }
    </script>
</body>
</html>
