<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация VK ID & Mail.ru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-container::-webkit-scrollbar { width: 6px; }
        .json-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .json-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center p-4 font-sans text-slate-900">

    <div class="max-w-4xl w-full flex flex-col items-center">
        
        <!-- Секция входа -->
        <div id="login-card" class="bg-white p-10 rounded-[28px] shadow-xl border border-white/60 max-w-md w-full text-center transition-all duration-500">
            <div class="mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-blue-200">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M13.162 18.994c.609 0 .858-.406.858-.912v-2.996c0-1.245.58-1.445 1.394-1.445s1.216.442 1.216 1.245v2.305c0 .71.35 1.058 1.012 1.058.662 0 1.013-.348 1.013-1.058v-2.305c0-.803.402-1.245 1.217-1.245s1.393.2 1.393 1.445v2.996c0 .506.25.912.858.912.608 0 .858-.406.858-.912v-3.79c0-1.887-1.162-2.73-2.612-2.73-1.037 0-1.838.442-2.262 1.217h-.053c-.35-.775-1.112-1.217-2.012-1.217-.85 0-1.637.348-2.012 1.058h-.053v-.912c0-.506-.25-.912-.858-.912-.609 0-.858.406-.858.912v5.795c0 .506.25.912.858.912zm-8.812 0c1.787 0 3.112-1.445 3.112-3.41s-1.325-3.41-3.112-3.41c-1.787 0-3.113 1.445-3.113 3.41s1.326 3.41 3.113 3.41zm0-1.57c-.825 0-1.387-.71-1.387-1.84s.562-1.84 1.387-1.84 1.388.71 1.388 1.84-.563 1.84-1.388 1.84z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900">Авторизация</h1>
                <p id="loading-status" class="text-slate-500 mt-2">Загрузка виджета...</p>
            </div>

            <div id="vk-auth-container" class="min-h-[150px] flex items-center justify-center"></div>

            <p class="text-[11px] text-slate-400 mt-8 leading-relaxed">
                Используйте VK ID или почту Mail.ru для тестирования.
            </p>
        </div>

        <!-- Секция данных -->
        <div id="profile-card" class="hidden w-full max-w-4xl animate-[fadeIn_0.5s_ease-out]">
            <div class="bg-white rounded-[32px] shadow-2xl overflow-hidden border border-slate-100">
                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-10 text-white">
                    <div class="flex items-center gap-6">
                        <div id="user-avatar" class="w-24 h-24 rounded-full border-4 border-white/20 bg-white/10 flex items-center justify-center text-3xl font-bold">
                            ?
                        </div>
                        <div>
                            <h2 id="user-name" class="text-3xl font-bold">Данные получены</h2>
                            <p id="user-status" class="text-blue-100 flex items-center gap-2 mt-1">
                                <span class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                                Ответ от API VK
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Результат обмена</h3>
                        <div class="grid grid-cols-1 gap-4">
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span class="text-xs text-slate-500 block mb-1">Статус</span>
                                <span id="info-status" class="text-slate-800 font-medium">Ожидание...</span>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span class="text-xs text-slate-500 block mb-1">Информация</span>
                                <span id="info-msg" class="text-slate-800 text-sm italic">Выполните вход в виджете</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="flex justify-between items-center">
                            <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Raw JSON Response</h3>
                            <button onclick="location.reload()" class="text-xs text-blue-600 hover:underline">Сбросить</button>
                        </div>
                        <div class="bg-slate-900 rounded-2xl p-4 shadow-inner overflow-hidden">
                            <pre id="raw-json" class="json-container text-emerald-400 text-xs font-mono overflow-auto max-h-[300px] whitespace-pre-wrap">{}</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Загружаем SDK -->
    <script src="https://unpkg.com/@vkid/sdk@latest/dist-sdk/umd/index.js"></script>

    <script type="text/javascript">
        function initVKID() {
            if (typeof window.VKIDSDK !== 'undefined') {
                const VKID = window.VKIDSDK;
                document.getElementById('loading-status').textContent = "Виджет готов";

                VKID.Config.init({
                    app: 54571103,
                    redirectUrl: window.location.href.split('?')[0], // Очищаем URL от параметров
                    responseMode: VKID.ConfigResponseMode ? VKID.ConfigResponseMode.Callback : 'callback',
                    source: 'lowcode',
                    scope: 'email', 
                });

                const oneTap = new VKID.OneTap();

                oneTap.render({
                    container: document.getElementById('vk-auth-container'),
                    showAlternativeLogin: true,
                    oauthList: ['mail_ru']
                })
                .on(VKID.WidgetEvents.ERROR, (error) => {
                    console.error("VK Widget Error:", error);
                    showDataInCard("Ошибка виджета", error);
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, function (payload) {
                    console.log("Success Event Payload:", payload);
                    
                    const code = payload.code;
                    const deviceId = payload.device_id;

                    document.getElementById('loading-status').textContent = "Обмениваем код на токен...";

                    VKID.Auth.exchangeCode(code, deviceId)
                        .then((result) => {
                            console.log("Exchange Result:", result);
                            showDataInCard("Успех", result);
                        })
                        .catch((err) => {
                            console.error("Exchange Error:", err);
                            showDataInCard("Ошибка обмена", err);
                        });
                });
            } else {
                document.getElementById('loading-status').textContent = "Ошибка: SDK не загружен";
            }
        }

        function showDataInCard(status, data) {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('profile-card').classList.remove('hidden');

            document.getElementById('info-status').textContent = status;
            document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

            if (data.user) {
                const u = data.user;
                document.getElementById('user-name').textContent = `${u.first_name || ''} ${u.last_name || ''}`.trim() || 'Пользователь';
                if (u.avatar) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${u.avatar}" class="w-full h-full rounded-full object-cover">`;
                }
                document.getElementById('info-msg').textContent = u.email || "Email не предоставлен";
            } else if (data.error) {
                document.getElementById('info-msg').textContent = data.error_description || data.error || "Произошла ошибка";
                document.getElementById('user-status').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span> Ошибка`;
            }
        }

        window.onload = initVKID;
    </script>
</body>
</html>
