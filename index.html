<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK ID Экстрактор — Инструмент для n8n</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-container::-webkit-scrollbar { width: 6px; }
        .json-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .json-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scope-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: #e2e8f0; color: #475569; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div id="login-card" class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h1 class="text-xl font-bold mb-4 text-indigo-600">Настройка прав</h1>
                
                <div class="space-y-3 mb-6">
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="wall" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Стена (wall)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="photos" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Фотографии (photos)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-amber-50 rounded-xl cursor-pointer hover:bg-amber-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="offline" checked class="w-4 h-4 text-amber-600">
                        <span class="text-sm font-medium text-amber-900 font-bold">Вечный доступ (offline)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="groups" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Группы (groups)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors">
                        <input type="checkbox" name="vk-scope" value="email" checked class="w-4 h-4 text-indigo-600">
                        <span class="text-sm font-medium">Email</span>
                    </label>
                </div>

                <button onclick="startAuth()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all active:scale-95 mb-4">
                    Получить токены
                </button>
                
                <div id="vk-auth-container" class="text-center"></div>
            </div>
            
            <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100 text-xs text-blue-700 leading-relaxed">
                <h3 class="font-bold mb-1 uppercase">Инфо</h3>
                Используйте кнопку выше для запроса всех разрешений. Виджет ниже (OneTap) обычно дает только базовый профиль.
            </div>
        </div>

        <div id="results-section" class="lg:col-span-2 space-y-6 opacity-40 pointer-events-none transition-all duration-500">
            
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Данные авторизации</h2>
                    <span id="expiry-tag" class="text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">---</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase">Access Token</span>
                            <button onclick="copy('access-token')" class="text-indigo-600 text-xs font-bold hover:underline">Копировать</button>
                        </div>
                        <div id="access-token" class="bg-slate-50 p-4 rounded-xl font-mono text-[11px] break-all border border-slate-100 text-slate-600">---</div>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Refresh Token (для n8n)</span>
                            <button onclick="copy('refresh-token')" class="text-indigo-600 text-xs font-bold hover:underline">Копировать</button>
                        </div>
                        <div id="refresh-token" class="bg-amber-50 p-4 rounded-xl font-mono text-[11px] break-all border border-amber-100 text-amber-700 font-bold italic">---</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <span class="block text-[10px] text-slate-400 uppercase mb-1">User ID</span>
                            <span id="user-id" class="font-bold font-mono text-lg">---</span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <span class="block text-[10px] text-slate-400 uppercase mb-1">Подтвержденные Scopes</span>
                            <div id="confirmed-scopes" class="flex flex-wrap gap-1 mt-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-emerald-50 p-8 rounded-3xl border border-emerald-100 space-y-4">
                <h3 class="text-lg font-bold text-emerald-800">Тест публикации</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-emerald-600 uppercase font-bold mb-1 ml-1">ID Группы (для теста)</label>
                        <input type="text" id="target-id" placeholder="Напр. 218... (пусто = своя стена)" 
                               class="w-full p-3 rounded-xl border border-emerald-200 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-emerald-600 uppercase font-bold mb-1 ml-1">Текст поста</label>
                        <input type="text" id="post-text" value="Тест через VK ID Sandbox 🚀" 
                               class="w-full p-3 rounded-xl border border-emerald-200 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                    </div>
                </div>
                <button onclick="testWallPost()" id="post-btn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">
                    Подготовить запрос для n8n
                </button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Full Server Response</h3>
                    <button onclick="location.reload()" class="text-[10px] text-slate-400 border border-slate-700 px-2 py-1 rounded hover:bg-slate-800">Сбросить всё</button>
                </div>
                <pre id="raw-json" class="json-container text-emerald-400 text-[10px] font-mono overflow-auto max-h-[300px] whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@vkid/sdk@latest/dist-sdk/umd/index.js"></script>
    <script>
        let currentAccessToken = "";
        let currentRefreshToken = "";
        let selectedScopes = "";

        // Инициализация виджета (OneTap) для удобства
        window.addEventListener('load', () => {
            if (typeof window.VKIDSDK !== 'undefined') {
                const VKID = window.VKIDSDK;
                VKID.Config.init({
                    app: 54571103, // Твой App ID
                    redirectUrl: window.location.origin + window.location.pathname,
                    responseMode: 'callback',
                    scope: 'email'
                });
                const oneTap = new VKID.OneTap();
                oneTap.render({ container: document.getElementById('vk-auth-container') })
                    .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, (payload) => exchange(payload));
            }
        });

        // Полноэкранная авторизация
        function startAuth() {
            const checkboxes = document.querySelectorAll('input[name="vk-scope"]:checked');
            selectedScopes = Array.from(checkboxes).map(cb => cb.value).join(' ');

            const VKID = window.VKIDSDK;
            VKID.Config.set({ scope: selectedScopes }); // Принудительно ставим выбранные скоупы
            
            VKID.Auth.login().then(payload => exchange(payload));
        }

        // Обмен кода на токены
        function exchange(payload) {
            const VKID = window.VKIDSDK;
            VKID.Auth.exchangeCode(payload.code, payload.device_id)
                .then(res => display(res))
                .catch(err => {
                    console.error(err);
                    alert("Ошибка обмена: " + (err.error_description || "см. консоль"));
                });
        }

        // Отображение данных
        function display(data) {
            const resSection = document.getElementById('results-section');
            resSection.classList.remove('opacity-40', 'pointer-events-none');

            currentAccessToken = data.access_token;
            currentRefreshToken = data.refresh_token || "";

            document.getElementById('access-token').textContent = currentAccessToken;
            document.getElementById('refresh-token').textContent = currentRefreshToken || "REFRESH_TOKEN НЕ ВЫДАН (добавьте 'offline')";
            document.getElementById('user-id').textContent = data.user_id;
            document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

            const expiry = document.getElementById('expiry-tag');
            expiry.textContent = `Expires: ${data.expires_in}s`;
            expiry.className = data.expires_in < 3601 ? "text-[10px] font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-700" : "text-[10px] font-bold px-3 py-1 rounded-full bg-amber-100 text-amber-700";

            const scopeContainer = document.getElementById('confirmed-scopes');
            scopeContainer.innerHTML = '';
            (data.scope || selectedScopes).split(' ').forEach(s => {
                if(s) scopeContainer.innerHTML += `<span class="scope-badge">${s}</span>`;
            });
        }

        // Тест Wall.Post
        function testWallPost() {
            const text = document.getElementById('post-text').value;
            const targetIdInput = document.getElementById('target-id').value.trim();
            const btn = document.getElementById('post-btn');
            
            let ownerId = "";
            if (targetIdInput) {
                // Превращаем в отрицательное для групп
                ownerId = targetIdInput.startsWith('-') ? targetIdInput : `-${targetIdInput}`;
            }

            const params = new URLSearchParams({
                message: text,
                access_token: currentAccessToken,
                v: '5.199'
            });
            if (ownerId) params.append('owner_id', ownerId);

            const apiUrl = `https://api.vk.com/method/wall.post?${params.toString()}`;
            
            console.log("=== URL ДЛЯ ТЕСТА В n8n ===");
            console.log(apiUrl);
            
            btn.textContent = "URL В КОНСОЛИ (F12)";
            btn.className = "w-full bg-blue-600 text-white py-3 rounded-xl font-bold transition-all";
            
            alert(`Токен принят!\n\nЦель (owner_id): ${ownerId || 'Личная стена'}\n\nПолный URL для HTTP Request в n8n скопирован в консоль браузера.`);
            
            setTimeout(() => {
                btn.textContent = "Подготовить запрос для n8n";
                btn.className = "w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all";
            }, 4000);
        }

        function copy(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text);
            const btn = event.target;
            const oldText = btn.textContent;
            btn.textContent = "Готово!";
            setTimeout(() => btn.textContent = oldText, 1500);
        }
    </script>
</body>
</html>
