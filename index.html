<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK ID Sandbox — Конструктор Токенов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-container::-webkit-scrollbar { width: 6px; }
        .json-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .json-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scope-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: #e2e8f0; color: #475569; }
    </style>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center p-4 font-sans text-slate-900">

    <div class="max-w-4xl w-full flex flex-col items-center gap-6">
        
        <div id="login-card" class="bg-white p-8 rounded-[28px] shadow-xl border border-white/60 max-w-md w-full transition-all duration-500">
            <div class="text-center mb-6">
                <h1 class="text-xl font-extrabold text-slate-900">Настройка прав доступа</h1>
                <p class="text-sm text-slate-500">Выберите Scope перед авторизацией</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8 text-sm bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" name="vk-scope" value="friends" class="rounded text-blue-600"> Друзья
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" name="vk-scope" value="groups" class="rounded text-blue-600"> Группы
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" name="vk-scope" value="wall" class="rounded text-blue-600"> Стена
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" name="vk-scope" value="photos" class="rounded text-blue-600"> Фото
                </label>
                <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" name="vk-scope" value="email" checked class="rounded text-blue-600"> Email
                </label>
                <label class="flex items-center gap-2 cursor-pointer font-bold text-amber-600 hover:text-amber-700">
                    <input type="checkbox" name="vk-scope" value="offline" class="rounded text-amber-600"> Offline (вечный)
                </label>
            </div>

            <div id="vk-auth-container" class="min-h-[100px] flex items-center justify-center">
                <button onclick="renderWidget()" class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 transition-all font-medium">
                    Применить и загрузить виджет
                </button>
            </div>

            <p id="loading-status" class="text-center text-[11px] text-slate-400 mt-6 italic">Нажмите кнопку выше для выбора прав</p>
        </div>

        <div id="profile-card" class="hidden w-full max-w-4xl">
            <div class="bg-white rounded-[32px] shadow-2xl overflow-hidden border border-slate-100">
                <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-10 text-white">
                    <div class="flex flex-col md:flex-row items-center gap-6">
                        <div id="user-avatar" class="w-20 h-20 rounded-full border-4 border-white/20 bg-white/10 flex items-center justify-center text-2xl font-bold">?</div>
                        <div class="text-center md:text-left flex-1">
                            <h2 id="user-name" class="text-2xl font-bold">...</h2>
                            <div id="requested-scopes" class="flex flex-wrap gap-1 mt-2">
                                </div>
                        </div>
                        <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 px-6 py-2 rounded-full text-sm font-medium border border-white/20 transition-colors">
                            Сбросить
                        </button>
                    </div>
                </div>
                
                <div class="p-8 space-y-6">
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Access Token</h3>
                            <span id="token-expiry" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold uppercase"></span>
                        </div>
                        <div class="relative">
                            <div class="bg-slate-50 border-2 border-blue-50 rounded-2xl p-5 pr-32 font-mono text-xs break-all text-slate-600 leading-relaxed">
                                <span id="access-token-display">...</span>
                                <div class="absolute right-3 top-3 bottom-3 flex items-center">
                                    <button id="copy-btn" onclick="copyToken()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-3 rounded-xl transition-all active:scale-95">Копировать</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 space-y-4">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Данные из токена</h3>
                            <div><p class="text-[10px] text-slate-400 uppercase">VK User ID</p><p id="info-id" class="font-bold">---</p></div>
                            <div><p class="text-[10px] text-slate-400 uppercase">Email</p><p id="info-email" class="font-bold">---</p></div>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">RAW JSON</h3>
                            <pre id="raw-json" class="json-container text-emerald-600 text-[10px] font-mono bg-slate-900 p-4 rounded-2xl overflow-auto max-h-[200px]"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <textarea id="copy-helper" class="fixed -top-full opacity-0"></textarea>
    <script src="https://unpkg.com/@vkid/sdk@latest/dist-sdk/umd/index.js"></script>

    <script>
        let currentAccessToken = "";
        let selectedScopesString = "";

        function renderWidget() {
            // Собираем выбранные права
            const checkboxes = document.querySelectorAll('input[name="vk-scope"]:checked');
            const scopes = Array.from(checkboxes).map(cb => cb.value);
            selectedScopesString = scopes.join(' ');

            if (typeof window.VKIDSDK !== 'undefined') {
                const VKID = window.VKIDSDK;
                const container = document.getElementById('vk-auth-container');
                container.innerHTML = ''; // Очищаем контейнер

                VKID.Config.init({
                    app: 54571103, // Твой ID
                    redirectUrl: window.location.origin + window.location.pathname,
                    responseMode: 'callback',
                    source: 'lowcode',
                    scope: selectedScopesString
                });

                const oneTap = new VKID.OneTap();
                oneTap.render({
                    container: container,
                    showAlternativeLogin: true
                })
                .on(VKID.WidgetEvents.ERROR, (error) => {
                    console.error(error);
                })
                .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, (payload) => {
                    VKID.Auth.exchangeCode(payload.code, payload.device_id)
                        .then(res => showProfile(res))
                        .catch(err => console.error(err));
                });

                document.getElementById('loading-status').textContent = "Виджет инициализирован с правами: " + selectedScopesString;
            }
        }

        function showProfile(data) {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('profile-card').classList.remove('hidden');

            currentAccessToken = data.access_token || "";
            document.getElementById('access-token-display').textContent = currentAccessToken;
            document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);
            
            // Отображаем время жизни
            const expiry = data.expires_in === 0 ? "Infinite (Offline)" : `${data.expires_in}s`;
            document.getElementById('token-expiry').textContent = `Expires: ${expiry}`;

            // Показываем запрошенные права тегами
            const scopeContainer = document.getElementById('requested-scopes');
            selectedScopesString.split(' ').forEach(s => {
                if(s) scopeContainer.innerHTML += `<span class="scope-badge">${s}</span>`;
            });

            if (data.user) {
                document.getElementById('user-name').textContent = `${data.user.first_name} ${data.user.last_name}`;
                if (data.user.avatar) {
                    document.getElementById('user-avatar').innerHTML = `<img src="${data.user.avatar}" class="w-full h-full rounded-full object-cover">`;
                }
            }
            document.getElementById('info-id').textContent = data.user_id || data.user?.id || '---';
            document.getElementById('info-email').textContent = data.email || "Скрыт или не запрошен";
        }

        function copyToken() {
            const helper = document.getElementById('copy-helper');
            const btn = document.getElementById('copy-btn');
            helper.value = currentAccessToken;
            helper.select();
            document.execCommand('copy');
            
            const oldText = btn.textContent;
            btn.textContent = "OK!";
            btn.className = "bg-emerald-500 text-white text-xs font-bold px-4 py-3 rounded-xl transition-all";
            setTimeout(() => {
                btn.textContent = oldText;
                btn.className = "bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-3 rounded-xl transition-all";
            }, 1500);
        }
    </script>
</body>
</html>
